<!DOCTYPE html>
<html lang="en">
    <head>

		<meta name="description" content="Tristan Lee — CS student, developer, pianist.">
		<link rel="stylesheet" href="/assets/css/styles.css">
		<link rel="icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">
		<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">

        <script>
            if (localStorage.getItem('theme') === 'dark')
            {
                document.documentElement.classList.add('dark');
            }
        </script>
        <style type="text/css">
            .caret 
            {
                display: inline-block;
                width: 15px;
                height: 30px;
                background-color: currentColor;
                animation: blink 1s infinite;
            }
            @keyframes blink 
            { 
                50% { opacity: 0; } 
            }
            .home-thumb-full
            {
                max-width: 100%;
                height: auto;
                border: 2px solid transparent;
                transition: border-color 0.2s ease;
            }
            .home-thumb-full:hover
            {
                border-color: currentColor;
            }
            main ul 
            { 
                list-style-type: disc; 
                margin-left: 1.5rem;
            }
            hr
            {
                border: 0;
                border-top: 1px solid currentColor;
                margin: 1.5rem 0;
                opacity: 1;
            }
        </style>
        <title>Contact</title>
    </head>
    <body class="font-mono bg-[#F5F5F5] dark:bg-black text-black dark:text-white transition-colors duration-200">
        <nav class="border-b border-black dark:border-white">
            <div class="container mx-auto px-6 py-4 flex flex-wrap justify-between items-center">
                <a class="text-xl font-bold hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/">
                    /home/
                </a>
                <ul class="flex flex-wrap gap-4 sm:gap-6 text-base">
                    
                        <li>
                            <a class="hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/about/">
                                abt/
                            </a>
                        </li>
                    
                    
                        <li>
                            <a class="hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/interests/">
                                int/
                            </a>
                        </li>
                    
                    
                        <li>
                            <a class="hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/projects/">
                                proj/
                            </a>
                        </li>
                    
                    
                </ul>
                <button id="themeToggle" class="border border-black dark:border-white px-3 py-1 text-sm hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition" onclick="toggleTheme()">
                    toggle theme
                </button>
            </div>
        </nav>
        <main class="container mx-auto px-6 py-10">
            <h1 class="text-3xl font-bold mb-4">contact me</h1>
<hr class="border-black dark:border-white mb-6">
<section class="mb-8">
    <h2 class="text-lg font-bold mb-4">send a message</h2>
    <div class="space-y-4 max-w-lg">
        <div>
            <label for="name" class="block text-sm font-bold">name:</label>
            <input type="text" id="name" class="w-full border border-black dark:border-white bg-transparent p-2 text-base focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white">
        </div>
        <div>
            <label for="email" class="block text-sm font-bold">email:</label>
            <input type="email" id="email" class="w-full border border-black dark:border-white bg-transparent p-2 text-base focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white">
        </div>
        <div>
            <label for="message" class="block text-sm font-bold">message:</label>
            <textarea id="message" class="w-full border border-black dark:border-white bg-transparent p-2 text-base focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white" rows="3"></textarea>
        </div>
        <button onclick="submitForm()" class="border border-black dark:border-white px-4 py-1 text-sm hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
            send
        </button>
    </div>
</section>
<hr class="border-black dark:border-white mb-6">
<section class="mb-6">
    <h2 class="text-lg font-bold mb-4">info</h2>
    <ul class="space-y-2 text-base">
