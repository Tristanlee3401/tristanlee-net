	</h2>
    <div class="space-y-4 max-w-lg">

				name:
			</label>

				   id="name" 
				   class="w-full border border-black dark:border-white bg-transparent p-2 text-base focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white">
        </div>
        <div>

				   class="block text-sm font-bold">
				email:
			</label>

				   id="email"

        </div>
        <div>
            <label for="message" 
				   class="block text-sm font-bold">
				message:
			</label>
            <textarea id="message" 
					  class="w-full border border-black dark:border-white bg-transparent p-2 text-base focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white"
					  rows="3">
			</textarea>
        </div>
        <button onclick="submitForm()" 
			    class="border border-black dark:border-white px-4 py-1 text-sm hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
