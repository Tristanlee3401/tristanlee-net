<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="/styles.css" rel="stylesheet">
        <title>Contact</title>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand" href="/">home</a>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">about</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/interests/">interests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact/">contact</a>
                    </li>

                </ul>
                <button class="btn btn-sm btn-outline-light ms-auto" onclick="toggleTheme()">toggle theme</button>
            </div>
        </nav>

        <main class="container my-5">
            <h1>contact me</h1>
            <hr>

            <section>
                <h2>send a message</h2>

                <label for="name">name:</label>
                <input type="text" id="name" class="form-control mb-2">

                <label for="email">email:</label>
                <input type="email" id="email" class="form-control mb-2">

                <label for="message">message:</label>
                <textarea id="message" class="form-control mb-3" rows="3"></textarea>

                <button type="button" class="btn btn-success" onclick="submitForm()">send</button>
            </section>

            <hr>

            <section>
                <h2>info</h2>
                <ul class="list-group">
                    <li class="list-group-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-at-fill" viewBox="0 0 16 16">

                        </svg>
                         <a href="mailto:tristanlee@hotmail.com">tristanlee@hotmail.com</a>
                    </li>
                    <li class="list-group-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-geo-alt" viewBox="0 0 16 16">
                            <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>

                         somewhere in Singapore

                </ul>
            </section>
            <a href="/" class="btn btn-secondary mt-3">back</a>
        </main>

        <footer class="text-center py-3">
            <p>Copyright &#169; Tristan Lee 2025</p>
