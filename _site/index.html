<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
			tailwind.config = 
			{
                darkMode: 'class',
				theme: 
				{
					extend: 
					{
						fontFamily:
						{
                            mono: ['"Courier New"', 'monospace'],
                        },
                    }
                }
            }
        </script>
	<style type="text/css">
		.caret {
			display: inline-block;
			width: 15px;
			height: 30px;
			background-color: currentColor;
			animation: blink 1s infinite;
		}
		@keyframes blink { 50% { opacity: 0; } }
		.home-thumb-full {
			max-width: 100%;
			height: auto;
			border: 2px solid transparent;
			transition: border-color 0.2s ease;
		}
		.home-thumb-full:hover {
			border-color: currentColor;
		}
		ul 
		{ 
			list-style-type: disc; 
			margin-left: 1.5rem;
		}

		hr
		{
			border: 0;
			border-top: 1px solid currentColor;
			margin:1.5rem 0;
			opacity: 1;
		}
	</style>
        <title>Tristan Lee</title>
    </head>
    <body class="font-mono bg-[#F5F5F5] dark:bg-black text-black dark:text-white transition-colors duration-200">
        <nav class="border-b border-black dark:border-white">
            <div class="container mx-auto px-6 py-4 flex flex-wrap justify-between items-center">
                <a class="text-xl font-bold tracking-tight" href="/personal/">
                    home
                </a>
			<ul class="flex flex-wrap gap-4 sm:gap-6">
				<li><a class="hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/personal/about/">about</a></li>
				<li><a class="hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/personal/interests/">interests</a></li>
				<li><a class="hover:text-gray-500 transition duration-200 hover:-translate-y-[3px] inline-block" href="/personal/contact/">contact</a></li>
			</ul>
                <button class="border border-black dark:border-white px-3 py-1 text-sm hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition" onclick="toggleTheme()">
                    toggle theme
                </button>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-10">
            
<header class="text-3xl font-bold mb-4 block">
	<span id ="text"></span><span class="caret"></span>
</header>

<hr class="border-black dark:border-white mb-6">

<p class="text-xl mb-4">Tristan here, welcome to my website.</p>

<section class="my-4">
	<h2 class="text-xl font-semibold mv-2">pages:</h2>
	<ul class="list-disc list-inside space-y-2">
		<li><a href="/about/">about me</a></li>
		<li><a href="/interests/">my interests</a></li>
		<li><a href="/contact/">contact</a></li>
	</ul>
</section>
<p>Click on the sky to enter a change in scenery...</p>
<a href="/personal/home/">
	<img src=/personal/assets/images/sky.jpg alt="Sky" class="home-thumb-full">
</a>

        </main>

        <footer class="text-center py-8 text-sm text-gray-500">
            <p>Copyright &copy; 2026 Tristan Lee</p>
        </footer>

        <script src="/personal/assets/js/script.js"></script>
    </body>
</html>
