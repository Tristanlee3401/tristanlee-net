---
layout: tailwind.liquid
title: Contact
permalink: "/contact/"
---
<h1 class="text-3xl font-bold mb-4">contact me</h1>
<hr class="border-black dark:border-white mb-6">

<section class="mb-8">
    <h2 class="text-xl font-bold mb-4">send a message</h2>

    <div class="space-y-4 max-w-lg">
        <div>
            <label for="name" class="block text-sm font-bold">name:</label>
            <input type="text" id="name" class="w-full border border-black dark:border-white bg-transparent p-2 focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white">
        </div>

        <div>
            <label for="email" class="block text-sm font-bold">email:</label>
            <input type="email" id="email" class="w-full border border-black dark:border-white bg-transparent p-2 focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white">
        </div>

        <div>
            <label for="message" class="block text-sm font-bold">message:</label>
            <textarea id="message" class="w-full border border-black dark:border-white bg-transparent p-2 focus:outline-none focus:ring-1 focus:ring-black dark:focus:ring-white" rows="3"></textarea>
        </div>

        <button onclick="submitForm()" class="border border-black dark:border-white px-4 py-1 text-sm hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition">
            send
        </button>
    </div>
</section>

<hr class="border-black dark:border-white mb-6">

<section class="mb-6">
    <h2 class="text-xl font-bold mb-4">info</h2>
    <ul class="space-y-2">
        <li class="flex items-center gap-2">
            <!-- Envelope SVG -->

            </svg>
            <a href="mailto:mail@tristanlee.net" class="hover:underline">mail@tristanlee.net</a>
        </li>
        <li class="flex items-center gap-2">
            <!-- Geo SVG -->
